<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Trip Planner</title>
    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f6f7fb;
            color: #111827;
        }

        .container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 680px;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 36px;
            box-shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 24px;
            color: #4b5563;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .button {
            display: inline-block;
            text-decoration: none;
            padding: 11px 18px;
            border-radius: 10px;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .button-primary {
            background: #2563eb;
            color: #ffffff;
        }

        .button-secondary {
            background: #ffffff;
            color: #1f2937;
            border-color: #d1d5db;
        }
    </style>
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Smart Trip Planner</h1>
            <p>Plan your next trip faster, based on your preferences.</p>

            <div class="actions">
                {% if user.is_authenticated %}
                    <a class="button button-primary" href="{% url 'chat' %}">Get Started</a>
                {% else %}
                    <a class="button button-primary" href="{% url 'login' %}">Get Started</a>
                {% endif %}
            </div>
        </section>
    </main>
</body>
</html>
