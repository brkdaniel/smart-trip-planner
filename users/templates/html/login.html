<!DOCTYPE html>
<html lang="en">
<head>
  {% load static %}
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Trippi | Login</title>
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>
  <div class="login-shell">
    <div class="login-background" aria-hidden="true">
      <video autoplay muted loop playsinline>
        <source src="{% static 'home.mp4' %}" type="video/mp4">
      </video>
      <div class="login-overlay"></div>
    </div>

    <main class="login-main">
      <section class="login-card" aria-label="Login">
        <p class="brand">Trippi</p>
        <h1>Conectează-te la aventura ta.</h1>
        <p class="subtitle">Intră în cont cu adresa de email și parola.</p>

        {% if form.non_field_errors %}
          <div class="form-error" role="alert">
            <strong>Login failed:</strong>
            <ul>
              {% for err in form.non_field_errors %}
                <li>{{ err }}</li>
              {% endfor %}
            </ul>
          </div>
        {% endif %}

        <form method="post" action="" class="login-form" autocomplete="off">
          {% csrf_token %}

          <label class="field">
            <span>Adresă email</span>
            {{ form.email }}
            {% if form.email.errors %}
              <small class="field-error">{{ form.email.errors.0 }}</small>
            {% endif %}
          </label>

          <label class="field">
            <div class="field-row">
              <span>Parolă</span>
              <span class="forgot-link">Ai uitat parola?</span>
            </div>
            {{ form.password }}
            {% if form.password.errors %}
              <small class="field-error">{{ form.password.errors.0 }}</small>
            {% endif %}
          </label>

          <input type="hidden" name="next" value="{{ next }}">
          <button type="submit" class="login-button">LOGIN</button>
        </form>

        <p class="signup-link">
          Nu ai cont? <a href="{% url 'signup' %}">Înregistrează-te</a>
        </p>
      </section>
    </main>
  </div>
</body>
</html>
