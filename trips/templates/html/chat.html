<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #111827;
            --muted: #6b7280;
            --border: #e5e7eb;
            --primary: #2563eb;
            --danger-bg: #fef2f2;
            --danger-border: #fecaca;
            --danger-text: #b91c1c;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, #eef2ff 0%, var(--bg) 58%);
            color: var(--text);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 760px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 26px rgba(17, 24, 39, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 1.8rem;
        }

        p {
            margin: 0 0 18px;
            color: var(--muted);
        }

        .error {
            margin: 0 0 16px;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid var(--danger-border);
            background: var(--danger-bg);
            color: var(--danger-text);
            font-size: 0.95rem;
        }

        form {
            display: grid;
            gap: 12px;
        }

        label {
            font-weight: 600;
            font-size: 0.95rem;
        }

        textarea {
            width: 100%;
            min-height: 140px;
            resize: vertical;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            font: inherit;
            box-sizing: border-box;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button,
        a.button {
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        button {
            background: var(--primary);
            color: #ffffff;
        }

        a.button {
            background: #ffffff;
            border: 1px solid var(--border);
            color: #111827;
        }

        @media (max-width: 700px) {
            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Trip Chat</h1>
        <p>Write your travel request and submit to create a new chat session.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <label for="prompt">Your prompt</label>
            <textarea id="prompt" name="prompt" placeholder="Example: Plan a 3-day city break in Rome with a medium budget..."></textarea>

            <div class="actions">
                <button type="submit">Send</button>
                <a class="button" href="{% url 'history' %}">View History</a>
            </div>
        </form>
    </main>
</body>
</html>
